<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <title>Login | Online Voting</title>
  <link rel="shortcut icon" href="https://www.kluniversity.in/ieee/img/klulogo.jpg" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Poppins:wght@400;500;600;700&display=swap');

    :root{
      --ink:#121A2E;
      --red:#C8102E;
      --red-dark:#A50D26;
      --paper:#F7F7F5;
      --slate:#475066;
      --gold:#E3B23C;
    }
    *{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
    html, body{ height:100%; width:100%; }

    .page{ display:grid; grid-template-columns: 1.15fr 1fr; min-height:100vh; }

    .visual-panel{
      background: var(--ink);
      color:#fff;
      position:relative;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      justify-content:center;
      padding: 64px 72px;
    }
    .visual-panel::before{
      content:'';
      position:absolute; inset:0;
      background-image: radial-gradient(rgba(255,255,255,0.06) 1.5px, transparent 1.5px);
      background-size: 22px 22px;
      pointer-events:none;
    }
    .visual-panel__content{ position:relative; z-index:2; max-width:420px; }
    .eyebrow{
      display:inline-block;
      font-size:12px;
      font-weight:600;
      letter-spacing:0.18em;
      text-transform:uppercase;
      color: var(--gold);
      margin-bottom:18px;
    }
    .visual-panel h1{
      font-family:'Fraunces', serif;
      font-weight:600;
      font-size:clamp(32px,4vw,44px);
      line-height:1.15;
      margin-bottom:18px;
    }
    .visual-panel p{
      color: rgba(255,255,255,0.7);
      font-size:15px;
      line-height:1.6;
      max-width:340px;
    }

    .ballot-art{ position:relative; z-index:2; width:200px; margin-top:48px; }
    .paper{ animation: dropIn 1.1s 0.5s cubic-bezier(.4,0,.2,1) forwards; }
    @keyframes dropIn{
      0%{ transform:translateY(0); opacity:1; }
      75%{ transform:translateY(46px); opacity:1; }
      100%{ transform:translateY(54px); opacity:0; }
    }
    .slot-glow{
      transform-box: fill-box;
      transform-origin:center;
      animation: pulseGlow 2.6s 1.7s ease-out infinite;
    }
    @keyframes pulseGlow{
      0%{ transform:scale(0.6); opacity:0; }
      30%{ transform:scale(1); opacity:0.6; }
      100%{ transform:scale(2.4); opacity:0; }
    }
    @media (prefers-reduced-motion: reduce){
      .paper, .slot-glow{ animation:none !important; }
    }

    .form-panel{ background: var(--paper); display:flex; align-items:center; justify-content:center; padding: 48px 32px; }
    .form-card{ width:100%; max-width:360px; }
    .kicker{ font-size:13px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--red); margin-bottom:8px; }
    .form-card h2{ font-family:'Fraunces', serif; font-size:28px; color:var(--ink); margin-bottom:28px; font-weight:600; }

    .form-msg{ font-size:13px; color:var(--red); margin-bottom:16px; }

    .field{ display:block; margin-bottom:22px; }
    .field__label{ display:block; font-size:12px; font-weight:600; color:var(--slate); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px; }
    .field__label i{ margin-right:6px; color:var(--red); font-size:11px; }
    .field input{
      width:100%; border:none; border-bottom:2px solid #DADDE3; background:transparent;
      padding:8px 2px; font-size:15px; color:var(--ink); outline:none;
      transition: border-color .25s ease;
    }
    .field input:focus{ border-bottom-color: var(--red); }

    .forgot{ display:block; text-align:right; font-size:12px; color:var(--slate); text-decoration:none; margin-bottom:28px; }
    .forgot:hover{ color:var(--red); }

    .submit-btn{
      width:100%; padding:13px; border:none; border-radius:4px;
      background: var(--red); color:#fff; font-size:15px; font-weight:600;
      letter-spacing:0.02em; cursor:pointer;
      transition: background .25s ease, letter-spacing .25s ease;
    }
    .submit-btn:hover{ background: var(--red-dark); letter-spacing:0.04em; }
    .submit-btn:focus-visible, .forgot:focus-visible, .signup-line a:focus-visible{
      outline:2px solid var(--gold); outline-offset:3px;
    }

    .signup-line{ margin-top:26px; font-size:13px; color:var(--slate); text-align:center; }
    .signup-line a{ color:var(--red); font-weight:600; text-decoration:none; }
    .signup-line a:hover{ text-decoration:underline; }

    @media (max-width: 860px){
      .page{ grid-template-columns: 1fr; }
      .visual-panel{ padding:40px 28px; min-height:200px; justify-content:flex-start; }
      .ballot-art, .visual-panel p{ display:none; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="visual-panel">
      <div class="visual-panel__content">
        <span class="eyebrow">Vote For Cause</span>
        <h1>Every vote<br>writes the<br>record.</h1>
        <p>Sign in to check candidate details, manage your registration, and follow results as they're counted.</p>
      </div>
      <svg class="ballot-art" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <path d="M30 90 L170 90 L160 190 L40 190 Z" fill="#C8102E"/>
        <rect x="20" y="78" width="160" height="18" rx="4" fill="#A50D26"/>
        <rect x="80" y="83" width="40" height="8" rx="2" fill="#121A2E"/>
        <circle class="slot-glow" cx="100" cy="87" r="6" fill="none" stroke="#E3B23C" stroke-width="2"/>
        <g class="paper">
          <rect x="84" y="20" width="32" height="44" rx="3" fill="#F7F7F5" stroke="#121A2E" stroke-width="2"/>
          <path d="M92 40 L98 46 L110 32" stroke="#C8102E" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
      </svg>
    </section>

    <section class="form-panel">
      <div class="form-card">
        <p class="kicker">Welcome back</p>
        <h2>Log in to your account</h2>
        {% if msg %}<p class="form-msg">{{ msg }}</p>{% endif %}
        <form method="post" action="{% url 'checkaminlogin' %}">
          {% csrf_token %}
          <label class="field">
            <span class="field__label"><i class="fas fa-user"></i>User ID</span>
            <input type="text" name="uname" placeholder="Enter your user ID" required>
          </label>
          <label class="field">
            <span class="field__label"><i class="fas fa-lock"></i>Password</span>
            <input type="password" name="pwd" placeholder="Enter your password" required>
          </label>
          <a href="#" class="forgot">Forgot your password?</a>
          <button type="submit" class="submit-btn">Log in</button>
        </form>
        <p class="signup-line">New here? <a href="{% url 'signup' %}">Register to vote</a></p>
      </div>
    </section>
  </div>
</body>
</html>
