```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password | Online Voting</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css"/>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0d1b3d;
    background-image:
    radial-gradient(rgba(255,255,255,.06) 1px, transparent 1px);
    background-size:20px 20px;
}

.container{
    width:420px;
    background:#fff;
    padding:35px;
    border-radius:12px;
    box-shadow:0 15px 35px rgba(0,0,0,.25);
}

.title{
    text-align:center;
    font-size:32px;
    font-weight:700;
    color:#0d1b3d;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    color:#666;
    font-size:14px;
    margin-bottom:25px;
}

.msg{
    background:#ffe5e5;
    color:#d6002b;
    padding:10px;
    border-radius:6px;
    margin-bottom:15px;
    font-size:13px;
}

.input-box{
    margin-bottom:18px;
}

.input-box label{
    display:block;
    margin-bottom:6px;
    font-size:13px;
    font-weight:600;
    color:#444;
}

.input-box input{
    width:100%;
    height:48px;
    padding:0 15px;
    border:1px solid #ddd;
    border-radius:6px;
    outline:none;
    font-size:14px;
    transition:.3s;
}

.input-box input:focus{
    border-color:#C8102E;
    box-shadow:0 0 0 3px rgba(200,16,46,.15);
}

.btn{
    width:100%;
    height:50px;
    border:none;
    border-radius:6px;
    background:#C8102E;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    background:#a90d25;
}

.back{
    text-align:center;
    margin-top:18px;
}

.back a{
    color:#C8102E;
    text-decoration:none;
    font-weight:600;
}

.icon{
    text-align:center;
    font-size:45px;
    color:#C8102E;
    margin-bottom:15px;
}

</style>
</head>

<body>

<div class="container">

    <div class="icon">
        <i class="fas fa-key"></i>
    </div>

    <div class="title">Reset Password</div>

    <div class="subtitle">
        Verify your account and create a new password
    </div>

    {% if msg %}
        <div class="msg">{{ msg }}</div>
    {% endif %}

    <form method="post" action="{% url 'resetpassword' %}">
        {% csrf_token %}

        <div class="input-box">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter username" required>
        </div>

        <div class="input-box">
            <label>Registered Email</label>
            <input type="email" name="email" placeholder="Enter registered email" required>
        </div>

        <div class="input-box">
            <label>New Password</label>
            <input type="password" name="new_password" placeholder="Enter new password" required>
        </div>

        <button type="submit" class="btn">
            Reset Password
        </button>
    </form>

    <div class="back">
        <a href="{% url 'login' %}">
            ← Back to Login
        </a>
    </div>

</div>

</body>
</html>
```
