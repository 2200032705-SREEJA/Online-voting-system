<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8">
    <title>|-Sign Up-|</title>
    <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='14' fill='%23121A2E'/><path d='M20 60 L80 60 L72 88 L28 88 Z' fill='%23C8102E'/></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>
  <body>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700&display=swap');
*{ margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins',sans-serif; }
html, body{ display: grid; min-height: 100vh; width: 100%; place-items: center; background: linear-gradient(to right, #00f2ff 0%, #f2ff00 100%); padding: 30px 0; }
::selection{ background: #FF0B12; }
.container{ background: #fff; max-width: 380px; width: 100%; padding: 30px 32px; border-radius: 5px; box-shadow: 0 10px 10px rgba(0, 0, 0, 0.15); }
.container form .title{ font-size: 28px; font-weight: 600; margin: 6px 0 10px 0; position: relative; }
.container form .title:before{ content: ''; position: absolute; height: 4px; width: 33px; left: 0px; bottom: 3px; border-radius: 5px; background: #FF0B12; }
.error-msg{ color:#d6002b; font-size:13px; margin-bottom:6px; }
.container form .input-box{ width: 100%; height: 45px; margin-top: 20px; position: relative; }
.container form .input-box input{ width: 100%; height: 100%; outline: none; font-size: 15px; border: none; }
.container form .underline::before{ content: ''; position: absolute; height: 2px; width: 100%; background: #ccc; left: 0; bottom: 0; }
.container form .underline::after{ content: ''; position: absolute; height: 2px; width: 100%; background: #FF0B12; left: 0; bottom: 0; transform: scaleX(0); transform-origin: left; transition: all 0.3s ease; }
.container form .input-box input:focus ~ .underline::after, .container form .input-box input:valid ~ .underline::after{ transform: scaleX(1); transform-origin: left; }
.field-hint{ font-size:11px; color:#888; margin-top:4px; }
.container form .button{ margin: 36px 0 18px 0; }
.container .input-box input[type="submit"]{ background: #FF0B12; font-size: 16px; color: #fff; border-radius: 5px; cursor: pointer; transition: all 0.3s ease; }
.container .input-box input[type="submit"]:hover{ letter-spacing: 1px; background: #A20F13; }
.container .option{ font-size: 14px; text-align: center; }
    </style>
    <div class="container">
      <form action="{% url 'createuser' %}" method="post">
        {% csrf_token %}
        {% if msg1 %}<p class="error-msg">{{ msg1 }}</p>{% endif %}
        <div class="title">Voter Sign Up</div>

        <div class="input-box underline">
          <input type="text" name="uid" placeholder="User Id" required>
          <div class="underline"></div>
        </div>
        <div class="input-box">
          <input type="password" name="password" placeholder="Enter your Password" minlength="10" maxlength="100" required>
          <div class="underline"></div>
        </div>
        <div class="input-box">
          <input type="email" name="email" placeholder="Enter your Email" required>
          <div class="underline"></div>
        </div>
        <div class="input-box">
          <input type="tel" name="phone" placeholder="10-digit Phone Number" pattern="[0-9]{10}" maxlength="10" required>
          <div class="underline"></div>
        </div>
        <div class="input-box">
          <input type="text" name="aadhar" placeholder="12-digit Aadhar Number" pattern="[0-9]{12}" maxlength="12" required>
          <div class="underline"></div>
        </div>
        <div class="input-box">
          <input type="date" name="dob" required>
          <div class="underline"></div>
        </div>
        <p class="field-hint">You must be 18 or older to register as a voter.</p>

        <div class="input-box button">
          <input type="submit" name="" value="Continue">
        </div>
        <center>
          <h6><p class="text--center">Already a member? <a href="{% url 'login' %}">Login</a></p></h6>
        </center>
      </form>
    </div>
  </body>
</html>
