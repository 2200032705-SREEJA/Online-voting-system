{% extends 'index.html' %}
{% block 'body' %}

<style>

body{
    background:#081120;
}

.feedback-section{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:50px 20px;
}

.feedback-card{
    width:100%;
    max-width:650px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:20px;
    padding:40px;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.feedback-title{
    text-align:center;
    margin-bottom:10px;
    font-size:38px;
    font-weight:700;
}

.feedback-subtitle{
    text-align:center;
    color:#d1d5db;
    margin-bottom:30px;
}

.success-msg{
    background:#22c55e;
    color:white;
    padding:12px;
    border-radius:10px;
    text-align:center;
    margin-bottom:20px;
    font-weight:600;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

.form-control{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.12);
    color:white;
    font-size:15px;
    outline:none;
}

.form-control::placeholder{
    color:#cbd5e1;
}

textarea.form-control{
    resize:none;
    min-height:140px;
}

.btn-row{
    display:flex;
    gap:15px;
    margin-top:25px;
}

.submit-btn{
    flex:1;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#16a34a;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

.submit-btn:hover{
    background:#15803d;
}

.back-btn{
    flex:1;
    text-align:center;
    text-decoration:none;
    padding:14px;
    border-radius:10px;
    background:#dc2626;
    color:white;
    font-size:16px;
    font-weight:600;
}

.back-btn:hover{
    background:#b91c1c;
}

</style>

<div class="feedback-section">

```
<div class="feedback-card">

    <h1 class="feedback-title">Feedback & Complaints</h1>

    <p class="feedback-subtitle">
        Help us improve the Online Voting System by sharing your feedback.
    </p>

    {% if msg %}
        <div class="success-msg">
            {{ msg }}
        </div>
    {% endif %}

    <form action="{% url 'submitfeedback' %}" method="post">
        {% csrf_token %}

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" class="form-control"
                   placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
            <label>Mobile Number</label>
            <input type="tel" name="number" class="form-control"
                   placeholder="Enter your mobile number" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" class="form-control"
                   placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Issue / Suggestion</label>
            <textarea name="issue" class="form-control"
                      placeholder="Describe your issue or suggestion..."
                      required></textarea>
        </div>

        <div class="btn-row">
            <button type="submit" class="submit-btn">
                Submit Feedback
            </button>

            <a href="{% url 'home' %}" class="back-btn">
                Back Home
            </a>
        </div>

    </form>

</div>
```

</div>

{% endblock %}
